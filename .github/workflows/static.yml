name: Deploy static content to Pages

on:
  push:
    branches: ["master"]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Inject secrets into config files
        run: |
          cat > supabase-secrets.js << EOF
          // Inyectado automáticamente por GitHub Actions
          window.SUPABASE_ANON_KEY = '${{ secrets.SUPABASE_ANON_KEY }}';
          EOF
          
          cat > google-auth-config.js << EOF
          // Configuración de Google OAuth
          window.GOOGLE_CLIENT_ID = '${{ secrets.GOOGLE_CLIENT_ID }}';
          console.log('Google Auth Config loaded');
          EOF
          
          cat > authorized-emails.js << EOF
          // Emails autorizados
          window.AUTHORIZED_EMAILS = '${{ secrets.AUTHORIZED_EMAILS }}';
          EOF
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
